<script>
document.addEventListener('DOMContentLoaded', function() {
    // === 1. 移除 Weebly 相關廣告殘留 ===
    var adElement = document.getElementById('weebly-footer-signup-container-v3');
    if (adElement) { adElement.remove(); }

    // === 2. 全新手機選單點擊自動關閉邏輯 ===
    var navLinks = document.querySelectorAll('.nav-link');
    var navToggle = document.getElementById('nav-toggle');

    navLinks.forEach(function(link) {
        link.addEventListener('click', function() {
            if (navToggle) {
                navToggle.checked = false; 
            }
        });
    });

    // === 3. 彈出公告視窗點擊強制關閉邏輯 ===
    var popup = document.getElementById('site-notice');
    document.addEventListener('click', function(event) {
        if (!popup || popup.style.display === 'none') return;
        var isCloseButton = event.target.closest('.close-btn-notice');
        var isBackdrop = (event.target === popup);
        if (isCloseButton || isBackdrop) {
            popup.style.setProperty('display', 'none', 'important');
            event.stopPropagation(); 
        }
    }, true);

    // === 4. 每 1.5 秒自動播放照片 + 縮圖連動機制 ===
    var mainImages = document.querySelectorAll('#main-stage img');
    var thumbLinks = document.querySelectorAll('#thumb-scroll .thumb-link');
    var thumbContainer = document.getElementById('thumb-scroll');
    var currentIndex = 0;
    var totalImages = mainImages.length;
    var playInterval;

    // 切換到指定索引照片的函式
    function changeSlide(index) {
        // 移除目前所有 active 狀態
        mainImages.forEach(function(img) { img.classList.remove('active'); });
        thumbLinks.forEach(function(lnk) { lnk.classList.remove('active'); });

        // 設定新索引的 active 狀態
        mainImages[index].classList.add('active');
        thumbLinks[index].classList.add('active');

        // 讓下方縮圖捲軸自動對齊到目前 active 的縮圖
        var targetThumb = thumbLinks[index];
        if (thumbContainer && targetThumb) {
            var containerWidth = thumbContainer.clientWidth;
            var thumbLeft = targetThumb.offsetLeft;
            var thumbWidth = targetThumb.clientWidth;
            // 計算置中滾動位置
            thumbContainer.scrollLeft = thumbLeft - (containerWidth / 2) + (thumbWidth / 2);
        }
        currentIndex = index;
    }

    // 啟動定時器（1.5 秒播放一次）
    function startAutoPlay() {
        playInterval = setInterval(function() {
            var nextIndex = (currentIndex + 1) % totalImages;
            changeSlide(nextIndex);
        }, 1500);
    }

    // 停止定時器
    function stopAutoPlay() {
        clearInterval(playInterval);
    }

    // 為下方每個縮圖綁定點擊事件
    thumbLinks.forEach(function(link, index) {
        link.addEventListener('click', function(e) {
            e.preventDefault(); // 阻擋原生 # 網址錨點跳轉，改用 JS 平滑處理
            stopAutoPlay();     // 使用者點擊時先暫停自動播放
            changeSlide(index); // 切換照片
            startAutoPlay();    // 重新計時自動播放
        });
    });

    // 啟動自動播放
    if (totalImages > 0) {
        startAutoPlay();
    }
});
</script>
	</body>
</html>
