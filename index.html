<script>
document.addEventListener('DOMContentLoaded', function() {
    
    // === Weebly 廣告隱藏邏輯 ===
    var adElement = document.getElementById('weebly-footer-signup-container-v3');
    if (adElement) {
        adElement.remove();
        adElement.style.pointerEvents = 'none';
        adElement.style.height = '0px';
        adElement.style.visibility = 'hidden';
    }

    // === 手機選單自動關閉邏輯 ===
    var anchorLinks = document.querySelectorAll('#navMobile a[href*="#"]');
    var hamburgerButton = document.querySelector('a.hamburger');

    if (anchorLinks.length > 0 && hamburgerButton) {
        anchorLinks.forEach(function(link) {
            link.addEventListener('click', function() {
                setTimeout(function() {
                    hamburgerButton.click();
                    document.body.classList.remove('nav-open'); 
                    document.body.classList.remove('mobile-nav-open'); 
                }, 50); 
            });
        });
    }

    // === 彈出視窗顯示與隱藏邏輯 ===
    var popup = document.getElementById('site-notice');
    var POPUP_DELAY = 1000; 

    function closePopup() {
        if (popup) {
            popup.style.setProperty('display', 'none', 'important');
        }
    }

    if (popup) { 
        var img = popup.querySelector('.notice-image');
        if (img) {
            var showPopup = function() {
                setTimeout(function() { popup.style.setProperty('display', 'flex', 'important'); }, POPUP_DELAY);
            };

            if (img.complete) {
                showPopup();
            }  else {
                img.onload = showPopup;
                img.onerror = function() {
                    console.error("Site notice image failed to load.");
                };
            }
        }
    }

    document.addEventListener('click', function(event) {
        if (!popup || popup.style.display === 'none') {
            return; 
        }
        
        var isCloseButton = event.target.closest('.close-btn-notice');
        var isBackdrop = (event.target === popup);

        if (isCloseButton || isBackdrop) {
            closePopup();
            event.stopPropagation(); 
        }
    }, true); 

});
</script>
